name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2️⃣ Python setup
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3️⃣ Install dependencies
    - name: Install Backend Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements_backend.txt

    # 4️⃣ Verify models folder exists
    - name: Check Models Folder
      run: |
        if [ -d "models" ]; then
          echo "✅ Models folder exists"
        else
          echo "❌ Models folder missing"
          exit 1
        fi

    # 5️⃣ Test API import
    - name: Test API Import
      run: |
        python -c "from api.app import app; print('✅ API OK')"

    # 6️⃣ Run retraining (AUTO MLOps)
    - name: Retrain Model
      run: |
        python retrain.py

    # 7️⃣ Verify model generated
    - name: Verify Latest Model
      run: |
        if [ -f "models/latest_model.pkl" ]; then
          echo "✅ latest_model.pkl exists"
        else
          echo "❌ Model not created"
          exit 1
        fi