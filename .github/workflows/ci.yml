name: Tesla AI MLOps CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Backend
        run: pip install -r requirements_backend.txt

      - name: Test Backend
        run: python -c "import fastapi, pandas, sklearn, xgboost"

      - name: Install Frontend
        run: pip install -r requirements.txt

      - name: Test Frontend
        run: python -c "import streamlit, yfinance, plotly"