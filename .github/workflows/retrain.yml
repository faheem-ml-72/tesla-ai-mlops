name: Auto Retrain Model

on:
  schedule:
    - cron: "0 0 * * *"   # every day (UTC)
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements_backend.txt

      - name: Run retraining
        run: python training/retrain.py

      - name: Commit updated model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add models/
          git commit -m "auto retrained model" || echo "No changes"
          git push